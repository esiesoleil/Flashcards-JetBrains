<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>National Capitals Flashcard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=League+Gothic&family=Roboto&display=swap" rel="stylesheet">
</head>
<body>
<h1 class="quiz-question">What is the capital of...</h1>
<div class="quiz-container">
    <div class="card">
        <div class="quiz-item">
            <div class="front"><p>Russia</p></div>
            <div class="back"><p>Moscow</p></div>
        </div>
    </div>
    <div class="card">
        <div class="quiz-item">
            <div class="front"><p>China</p></div>
            <div class="back"><p>Beijing</p></div>
        </div>
    </div>
    <div class="card">
        <div class="quiz-item">
            <div class="front"><p>Mexico</p></div>
            <div class="back"><p>Mexico City</p></div>
        </div>
    </div>

    <div class="card">
        <div class="quiz-item">
            <div class="front"><p>South Korea</p></div>
            <div class="back"><p>Seoul</p></div>
        </div>
    </div>
    <div class="card">
        <div class="quiz-item">
            <div class="front"><p>Sweden</p></div>
            <div class="back"><p>Stockholm</p></div>
        </div>
    </div>
    <div class="card">
        <div class="quiz-item">
            <div class="front"><p>Greece</p></div>
            <div class="back"><p>Athens</p></div>
        </div>
    </div>

    <div class="card">
        <div class="quiz-item">
            <div class="front"><p>Canada</p></div>
            <div class="back"><p>Ottawa</p></div>
        </div>
    </div>
    <div class="card">
        <div class="quiz-item">
            <div class="front"><p>Thailand</p></div>
            <div class="back"><p>Bangkok</p></div>
        </div>
    </div>
    <div class="card">
        <div class="quiz-item">
            <div class="front"><p>Japan</p></div>
            <div class="back"><p>Tokyo</p></div>
        </div>
    </div>
</div>
</body>
</html>
